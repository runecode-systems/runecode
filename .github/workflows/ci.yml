name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare-tla2tools:
    name: Prepare cached TLC jar
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.meta.outputs.cache-key }}
      jar-sha256: ${{ steps.meta.outputs.jar-sha256 }}
    env:
      TLA2TOOLS_CACHE_DIR: .ci-cache/tlaplus
      TLA2TOOLS_CACHE_FILE: .ci-cache/tlaplus/tla2tools.jar
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
        with:
          use-flakehub: false

      - name: Compute TLC cache key
        id: meta
        run: |
          set -euo pipefail

          out_path="$(nix build .#tla2tools-jar --no-link --print-out-paths)"
          jar_sha256="$(cat "${out_path}/tla2tools.jar.sha256")"
          case "${jar_sha256}" in
            [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]) ;;
            *)
              echo "unexpected tla2tools.jar SHA256 format: ${jar_sha256}" >&2
              exit 1
              ;;
          esac
          echo "cache-key=tla2tools-jar-${out_path##*/}" >> "$GITHUB_OUTPUT"
          echo "jar-sha256=${jar_sha256}" >> "$GITHUB_OUTPUT"

      - name: Restore cached TLC jar
        id: cache-restore
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ env.TLA2TOOLS_CACHE_FILE }}
          key: ${{ steps.meta.outputs.cache-key }}
          enableCrossOsArchive: true

      - name: Populate TLC jar cache on miss
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          mkdir -p "${TLA2TOOLS_CACHE_DIR}"
          out_path="$(nix build .#tla2tools-jar --no-link --print-out-paths)"
          cp "${out_path}/tla2tools.jar" "${TLA2TOOLS_CACHE_FILE}"

      - name: Save TLC jar cache
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ env.TLA2TOOLS_CACHE_FILE }}
          key: ${{ steps.meta.outputs.cache-key }}
          enableCrossOsArchive: true

  nix:
    name: Nix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    env:
      NIX_CONFIG: |
        substituters = https://cache.nixos.org
        trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
        with:
          use-flakehub: false

      - name: Verify flake.lock preflight
        run: git diff --exit-code -- flake.lock

      - name: Validate flake.lock metadata
        run: nix flake lock --no-update-lock-file

      - name: Log Nix version
        run: nix --version

      - name: Run flake checks
        run: nix flake check --no-write-lock-file

      - name: Run CI command in dev shell
        run: nix develop --no-write-lock-file -c just ci

      - name: Verify flake.lock unchanged
        run: git diff --exit-code -- flake.lock

      - name: Verify repository unchanged after CI command
        run: |
          git diff --exit-code
          untracked="$(git ls-files --others --exclude-standard)"
          if [ -n "$untracked" ]; then
            echo "Untracked files found after CI command:"
            echo "$untracked"
            exit 1
          fi

  windows:
    name: Windows portability (Node ${{ matrix.node-version }})
    runs-on: windows-latest
    needs: prepare-tla2tools
    env:
      TLA2TOOLS_CACHE_DIR: .ci-cache\tlaplus
      TLA2TOOLS_CACHE_FILE: .ci-cache\tlaplus\tla2tools.jar
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.22.1"
          - "24.14.0"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.7"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install just
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # v2.68.25
        with:
          tool: just@1.43.1

      - name: Install gopls
        shell: pwsh
        run: |
          go install golang.org/x/tools/gopls@v0.20.0
          "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install baseline CLI tools
        shell: pwsh
        run: |
          choco install -y ripgrep --version=14.1.0 --allow-downgrade
          choco install -y fd --version=10.3.0 --allow-downgrade
          choco install -y jq --version=1.8.1 --allow-downgrade

      - name: Setup Java for TLC
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore cached TLC jar
        id: cache-tla2tools
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ env.TLA2TOOLS_CACHE_FILE }}
          key: ${{ needs.prepare-tla2tools.outputs.cache-key }}
          enableCrossOsArchive: true

      - name: Configure cached TLC jar
        shell: pwsh
        run: |
          if ("${{ steps.cache-tla2tools.outputs.cache-hit }}" -ne "true") {
            Write-Error "cached TLC jar missing for key ${{ needs.prepare-tla2tools.outputs.cache-key }}"
            exit 1
          }
          $jarPath = Join-Path $env:GITHUB_WORKSPACE $env:TLA2TOOLS_CACHE_FILE
          if (-not (Test-Path -LiteralPath $jarPath)) {
            Write-Error "expected cached TLC jar at $jarPath"
            exit 1
          }
          $sha256 = (Get-FileHash -Algorithm SHA256 $jarPath).Hash.ToLowerInvariant()
          if ($sha256 -ne "${{ needs.prepare-tla2tools.outputs.jar-sha256 }}") {
            Write-Error "cached TLC jar SHA256 mismatch: $sha256"
            exit 1
          }
          "TLA2TOOLS_JAR=$jarPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run portability checks
        run: just ci

      - name: Verify repository unchanged after portability checks
        shell: pwsh
        run: |
          git diff --exit-code
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $untracked = git ls-files --others --exclude-standard
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($untracked) {
            Write-Host "Untracked files found after portability checks:"
            $untracked
            exit 1
          }
