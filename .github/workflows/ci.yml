name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  nix:
    name: Nix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    env:
      NIX_CONFIG: |
        substituters = https://cache.nixos.org
        trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Verify flake.lock preflight
        run: git diff --exit-code -- flake.lock

      - name: Validate flake.lock metadata
        run: nix flake lock --no-update-lock-file

      - name: Log Nix version
        run: nix --version

      - name: Run flake checks
        run: nix flake check --no-write-lock-file

      - name: Run CI command in dev shell
        run: nix develop --no-write-lock-file -c just ci

      - name: Verify flake.lock unchanged
        run: git diff --exit-code -- flake.lock

  windows:
    name: Windows portability
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23.8"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install just
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # v2
        with:
          tool: just

      - name: Install gopls
        shell: pwsh
        run: |
          go install golang.org/x/tools/gopls@v0.16.2
          "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install baseline CLI tools
        shell: pwsh
        run: choco install -y ripgrep fd jq

      - name: Run portability checks
        run: just ci
