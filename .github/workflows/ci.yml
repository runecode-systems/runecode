name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  nix:
    name: Nix (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu required shared-linux perf
            ci-target: ci-required-shared-linux
          - os: macos-latest
            label: macos portability
            ci-target: ci-portability
    env:
      NIX_CONFIG: |
        substituters = https://cache.nixos.org
        trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
        with:
          use-flakehub: false

      - name: Verify flake.lock preflight
        run: git diff --exit-code -- flake.lock

      - name: Validate flake.lock metadata
        run: nix flake lock --no-update-lock-file

      - name: Log Nix version
        run: nix --version

      - name: Run flake checks
        run: nix flake check --no-write-lock-file

      - name: Run CI command in dev shell
        run: nix develop --no-write-lock-file -c just ${{ matrix.ci-target }}

      - name: Verify flake.lock unchanged
        run: git diff --exit-code -- flake.lock

      - name: Verify repository unchanged after CI command
        run: |
          git diff --exit-code
          untracked="$(git ls-files --others --exclude-standard)"
          if [ -n "$untracked" ]; then
            echo "Untracked files found after CI command:"
            echo "$untracked"
            exit 1
          fi

  formal-security-kernel:
    name: Formal security kernel TLA
    runs-on: ubuntu-latest
    env:
      NIX_CONFIG: |
        substituters = https://cache.nixos.org
        trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect TLA-relevant PR changes
        id: tla_changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
            echo "mode=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          if grep -E '^(formal/tla/|tools/tlccheck/|justfile|\.github/workflows/ci\.yml)' <<< "$changed_files"; then
            echo "required=true" >> "$GITHUB_OUTPUT"
            echo "mode=all" >> "$GITHUB_OUTPUT"
          elif grep -E '^(protocol/|internal/|cmd/|runner/|docs/trust-boundaries\.md|runecontext/standards/security/|runecontext/standards/global/|runecontext/changes/CHG-2026-015-[^/]+/)' <<< "$changed_files"; then
            echo "required=true" >> "$GITHUB_OUTPUT"
            echo "mode=core" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Report TLA skip
        if: github.event_name == 'pull_request' && steps.tla_changes.outputs.required != 'true'
        run: echo "No security-kernel-relevant changes detected; TLA model check skipped for this PR diff."

      - name: Install Nix
        if: steps.tla_changes.outputs.required == 'true'
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Cache Nix store
        if: steps.tla_changes.outputs.required == 'true'
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
        with:
          use-flakehub: false

      - name: Run PR core TLA model check
        if: github.event_name == 'pull_request' && steps.tla_changes.outputs.mode == 'core'
        run: nix develop --no-write-lock-file -c just model-check-core

      - name: Run full TLA model check
        if: steps.tla_changes.outputs.mode == 'all'
        run: nix develop --no-write-lock-file -c just model-check

      - name: Verify repository unchanged after TLA check
        if: steps.tla_changes.outputs.required == 'true'
        run: |
          git diff --exit-code
          untracked="$(git ls-files --others --exclude-standard)"
          if [ -n "$untracked" ]; then
            echo "Untracked files found after TLA check:"
            echo "$untracked"
            exit 1
          fi

  windows:
    name: Windows portability (Node ${{ matrix.node-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.22.1"
          - "24.14.0"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.7"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install just
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # v2.68.25
        with:
          tool: just@1.43.1

      - name: Install gopls
        shell: pwsh
        run: |
          go install golang.org/x/tools/gopls@v0.20.0
          "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install baseline CLI tools
        shell: pwsh
        run: |
          choco install -y ripgrep --version=14.1.0 --allow-downgrade
          choco install -y fd --version=10.3.0 --allow-downgrade
          choco install -y jq --version=1.8.1 --allow-downgrade

      - name: Run portability checks
        run: just ci-portability

      - name: Verify repository unchanged after portability checks
        shell: pwsh
        run: |
          git diff --exit-code
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $untracked = git ls-files --others --exclude-standard
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($untracked) {
            Write-Host "Untracked files found after portability checks:"
            $untracked
            exit 1
          }
